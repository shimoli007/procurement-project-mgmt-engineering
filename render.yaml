services:
  - type: web
    name: cynea-procureeng
    runtime: node
    plan: starter
    buildCommand: npm run render:build
    startCommand: npm run render:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: procurement-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
